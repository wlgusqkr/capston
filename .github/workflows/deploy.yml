name: Deploy to homeserver

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-homeserver
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, homeserver]
    timeout-minutes: 20

    env:
      REPO_DIR: /Users/parkparkjihyeon/homeserver/services/slgi/repo/capston
      SLGI_DIR: /Users/parkparkjihyeon/homeserver/services/slgi

    steps:
      - name: Sync repo on host
        run: |
          cd "$REPO_DIR"
          git fetch --all --prune
          git reset --hard origin/main

      - name: Build frontend (atomic swap into $SLGI_DIR/dist)
        run: |
          cd "$REPO_DIR/frontend"
          docker run --rm -v "$PWD:/app" -w /app node:22-alpine \
            sh -c "npm ci --no-audit --no-fund && npm run build"
          rm -rf "$SLGI_DIR/dist.new"
          cp -r dist "$SLGI_DIR/dist.new"
          rm -rf "$SLGI_DIR/dist"
          mv "$SLGI_DIR/dist.new" "$SLGI_DIR/dist"

      - name: Build backend image
        run: |
          cd "$SLGI_DIR"
          docker compose build

      - name: Run migrations (fail fast, do not touch live container)
        run: |
          cd "$SLGI_DIR"
          docker compose run --rm backend python manage.py migrate --noinput

      - name: Restart backend
        run: |
          cd "$SLGI_DIR"
          docker compose up -d

      - name: Smoke test (backend schema via caddy)
        run: |
          for i in 1 2 3 4 5; do
            if docker exec caddy wget -q -O- http://slgi-backend:8000/api/schema/ > /dev/null; then
              echo "Backend OK"
              exit 0
            fi
            echo "Retry $i..."
            sleep 3
          done
          echo "Backend healthcheck failed"
          exit 1
