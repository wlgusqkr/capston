# 슬기로운 자취생활 — nginx 사이트 설정.
# /etc/nginx/sites-available/slgi 로 복사 후 sites-enabled에 심볼릭 링크.
# 단일 오리진: 프론트 정적 + Django(/api, /admin, /static, /media) 동시 서빙.

upstream slgi_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    client_max_body_size 20M;

    # ---- 프론트엔드 정적 ----
    root /home/wlgusqkr22/slgi/frontend/dist;
    index index.html;

    # 해시 붙은 자산은 장기 캐시
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- Django 백엔드 ----
    location /api/ {
        proxy_pass http://slgi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://slgi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django collectstatic (admin / DRF browsable / Swagger 자산)
    location /static/ {
        alias /home/wlgusqkr22/slgi/backend/staticfiles/;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /home/wlgusqkr22/slgi/backend/media/;
        access_log off;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
