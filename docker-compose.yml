# 로컬 개발 환경. 두 갈래 지원:
#
#   • mac/linux 권장: 호스트 venv (uv) + 이 docker-compose는 db/redis만 띄움.
#   • windows 권장: 풀 docker (GDAL 설치 우회). 이 파일의 backend 서비스 사용.
#
# 운영 배포는 별도 (홈서버의 services/slgi/docker-compose.yml).
#
# ─────────────────────────────────────────────────────────────────────────────
# [A] mac/linux — venv 경로 (디버깅 부드러움)
# ─────────────────────────────────────────────────────────────────────────────
#   cp backend/.env.example backend/.env        # <YOUR_USER>/<YOUR_PASSWORD> 채우기
#   cp frontend/.env.example frontend/.env
#   brew install gdal geos proj                  # mac 1회
#
#   # 모드 1) 원격 DB (기본):
#   ssh -N -L 5432:127.0.0.1:5432 parkparkjihyeon@<ZeroTier-IP>
#   docker compose up -d redis                   # redis만
#
#   # 모드 2) 로컬 DB:
#   # backend/.env에서 DATABASE_URL을 127.0.0.1:5433으로 토글
#   docker compose --profile local-db up -d db redis
#
#   cd backend && uv sync && uv run python manage.py runserver
#   # 또는 VSCode F5 → "Django: runserver (venv)"
#
# ─────────────────────────────────────────────────────────────────────────────
# [B] windows — 풀 docker 경로 (GDAL 설치 회피)
# ─────────────────────────────────────────────────────────────────────────────
#   cp backend/.env.docker.example backend/.env  # <YOUR_USER>/<YOUR_PASSWORD> 채우기
#   cp frontend/.env.example frontend/.env
#
#   # 모드 1) 원격 DB:
#   ssh -N -L 5432:127.0.0.1:5432 parkparkjihyeon@<ZeroTier-IP>
#   docker compose up -d                         # backend + redis
#
#   # 모드 2) 로컬 DB:
#   # backend/.env에서 DATABASE_URL을 db:5432로 토글
#   docker compose --profile local-db up -d
#
#   cd frontend && npm install && npm run dev
#
#   # 디버거 attach (VSCode F5 → "Attach to Django (docker)"):
#   docker compose stop backend
#   docker compose run --rm --service-ports backend \
#     python -m debugpy --listen 0.0.0.0:5678 --wait-for-client \
#     manage.py runserver 0.0.0.0:8000 --noreload

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: slgi-db
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: slgi
      POSTGRES_PASSWORD: slgi
      POSTGRES_DB: slgi
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slgi -d slgi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: slgi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: slgi-backend-dev
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres-data:
