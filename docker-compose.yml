# 로컬 개발용 — backend + db + redis 전부 docker.
# 운영 배포는 별도 (홈서버의 services/slgi/docker-compose.yml).
#
# 셋업:
#   cp backend/.env.example backend/.env
#   cp frontend/.env.example frontend/.env
#   docker compose up -d
#   cd frontend && npm install && npm run dev
#   → http://localhost:5173
#
# VSCode 디버거 attach 사용 시:
#   docker compose stop backend
#   docker compose run --rm --service-ports backend \
#     python -m debugpy --listen 0.0.0.0:5678 --wait-for-client \
#     manage.py runserver 0.0.0.0:8000 --noreload
#   VSCode → F5 → "Attach to Django (docker)"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: slgi-db
    environment:
      POSTGRES_USER: slgi
      POSTGRES_PASSWORD: slgi
      POSTGRES_DB: slgi
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slgi -d slgi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: slgi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: slgi-backend-dev
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres-data:
